# goffice lamp relight via the ORIGINAL palette-mask workflow:
# the light source is painted GREEN ('010') in the pre-made mask video;
# we turn it ON at full intensity with WHITE light.
# Frames extracted from /home/xxing/model/gr3en/demo_video/goffice_lamp_{video,mask}.mp4

'task': 'ti2v-5B'
'ckpt_dir': 'checkpoints/wan2.2-ti2v-5b'

resume_from_checkpoint: "checkpoints/gr3en_weights.pt"
resume_step: 0

zipnerf: false

#### GR3EN_dataset inference config ####
start_idx: 0

# '010' = the green-painted light source; 1.0 = fully on.
mask_intensity: {
    "010": 1.0,
}

# White light.
light_color: {
    "010": [1.0, 1.0, 1.0],
}

ambient_scale: 0.5
test_root: "data/goffice_lamp/"
input_name: "frames"
mask_name: "mask"
ae_scale: 0.99
# frames were pre-conformed to exactly 81
frame_step: 1

# basic model config, NO NEED to change unless you know what you are doing
image_size: [352, 640]
max_num_frames: 81
mixed_precision: "bf16"
stride_min: 1
stride_max: 1
train_batch_size: 1
dataloader_num_workers: 2

gradient_accumulation_steps: 1
learning_rate: 0.0001
lr_scheduler: "cosine_with_restarts"
lr_warmup_steps: 100
lr_num_cycles: 3
max_grad_norm: 1.0
enable_slicing: true
enable_tiling: true
gradient_checkpointing: true
allow_tf32: true
