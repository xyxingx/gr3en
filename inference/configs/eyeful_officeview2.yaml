task: 'ti2v-5B'
# 'size': '640*352'
ckpt_dir: './checkpoints/wan2.2-ti2v-5b'

resume_from_checkpoint: "./checkpoints/gr3en_v3_11200"
resume_step: 11200

zipnerf: false

#### GR3EN_dataset inference config ####
start_idx: 0
mask_intensity:
  "110": 0
  "100": 0
  "010": 0
  "001": 0
light_color:
  "100": [1.0, 0.41, 0.71]  # deep pink
  "110": [1.0, 0.41, 0.71]
ambient_scale: 0
test_root: "./data/seating_2/"
input_name: "frames"
mask_name: "mask"
ae_scale: null
frame_step: 5

# basic model config
image_size: [352, 640]
max_num_frames: 21
mixed_precision: "bf16"
stride_min: 1
stride_max: 1
train_batch_size: 1
dataloader_num_workers: 2

gradient_accumulation_steps: 1
learning_rate: 0.0001
lr_scheduler: "cosine_with_restarts"
lr_warmup_steps: 100
lr_num_cycles: 3
max_grad_norm: 1.0
enable_slicing: true
enable_tiling: true
gradient_checkpointing: true
allow_tf32: true
