# Seating clip: ALL lamps ON (white, full intensity) via the original
# palette-mask workflow. Lamps auto-detected from seating_mask_rgb.mp4: ['110', '001', '010', '100']
# Frames extracted (time-aligned, mask resized to video res) into data/seating

'task': 'ti2v-5B'
'ckpt_dir': 'checkpoints/wan2.2-ti2v-5b'

resume_from_checkpoint: "checkpoints/gr3en_weights_28000_full.pt"
resume_step: 28000

zipnerf: false

start_idx: 0

mask_intensity: {
    "110": 1.0,
    "001": 1.0,
    "010": 1.0,
    "100": 1.0,
}

light_color: {
    "110": [1.0, 1.0, 1.0],
    "001": [1.0, 1.0, 1.0],
    "010": [1.0, 1.0, 1.0],
    "100": [1.0, 1.0, 1.0],
}

ambient_scale: 0.5
test_root: "data/seating/"
input_name: "frames"
mask_name: "mask"
ae_scale: 0.99
frame_step: 1

image_size: [352, 640]
max_num_frames: 81
mixed_precision: "bf16"
stride_min: 1
stride_max: 1
train_batch_size: 1
dataloader_num_workers: 2

gradient_accumulation_steps: 1
learning_rate: 0.0001
lr_scheduler: "cosine_with_restarts"
lr_warmup_steps: 100
lr_num_cycles: 3
max_grad_norm: 1.0
enable_slicing: true
enable_tiling: true
gradient_checkpointing: true
allow_tf32: true
